# Hugo configuration file
title: Rafael Adão

disableKinds:
  - section

defaultContentLanguage: pt

languages:
  pt:
    label: Português
    locale: pt-BR
    weight: 1
  en:
    label: English
    locale: en
    weight: 2

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main: []

params:
  theme:
    default: light
    displayToggle: true

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    enable: false
    displayCopyright: false
    displayPoweredBy: false

  terror:
    githubURL: "https://github.com/rafaeladao/"
    linkedinURL: "https://www.linkedin.com/in/rafael-adao/"

  editURL:
    enable: false

  description: Staff Engineer - distributed systems, search, data pipelines, multi-tenant architectures.

  blog:
    list:
      sortBy: date
      sortOrder: desc
      pagerSize: 20
      displayTags: false

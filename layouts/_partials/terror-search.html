{{- $placeholder := (T "searchPlaceholder") | default "Search..." -}}
<div class="terror-sidebar__search brutalist-shadow">
  <label for="terror-site-search-input" class="terror-sidebar__search-label">
    {{- /* Same glyph as goal.html: Lucide "search" (inline SVG, no script) */ -}}
    <svg class="terror-sidebar__search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.3-4.3" />
    </svg>
    {{ T "terror.searchArticles" }}
  </label>
  <div class="hextra-search-wrapper terror-sidebar__search-field">
    <div class="hx:relative hx:flex hx:items-center hx:text-gray-900 hx:contrast-more:text-gray-800 hx:dark:text-gray-300 hx:contrast-more:dark:text-gray-300">
      <input
        id="terror-site-search-input"
        placeholder="{{ $placeholder }}"
        aria-label="{{ $placeholder }}"
        class="hextra-search-input hx:hextra-focus-visible hx:block hx:w-full hx:appearance-none hx:rounded-lg hx:px-3 hx:py-2 hx:transition-colors hx:text-base hx:leading-tight hx:md:text-sm hx:bg-black/[.05] hx:dark:bg-gray-50/10 hx:focus-visible:bg-white hx:dark:focus-visible:bg-dark hx:placeholder:text-gray-500 hx:dark:placeholder:text-gray-400 hx:contrast-more:border hx:contrast-more:border-current"
        type="search"
        autocomplete="off"
        value=""
        spellcheck="false"
      />
      <kbd
        class="hx:absolute hx:my-1.5 hx:select-none hx:ltr:right-1.5 hx:rtl:left-1.5 hx:h-5 hx:rounded-sm hx:bg-white hx:px-1.5 hx:font-mono hx:text-[10px] hx:font-medium hx:text-gray-500 hx:border hx:border-gray-200 hx:dark:border-gray-100/20 hx:dark:bg-dark/50 hx:contrast-more:border-current hx:contrast-more:text-current hx:contrast-more:dark:border-current hx:items-center hx:gap-1 hx:transition-opacity hx:pointer-events-none hx:hidden hx:sm:flex terror-sidebar__search-kbd"
      >
        CTRL K
      </kbd>
    </div>

    <div>
      <ul
        class="hextra-search-results hextra-scrollbar hx:hidden hx:border hx:border-gray-200 hx:bg-white hx:text-gray-100 hx:dark:border-neutral-800 hx:dark:bg-neutral-900 hx:absolute hx:top-full hx:z-20 hx:mt-2 hx:overflow-auto hx:overscroll-contain hx:rounded-xl hx:py-2.5 hx:shadow-xl hx:max-h-[min(calc(50vh-11rem-env(safe-area-inset-bottom)),400px)] hx:md:max-h-[min(calc(100vh-5rem-env(safe-area-inset-bottom)),400px)] hx:inset-x-0 hx:ltr:md:left-auto hx:rtl:md:right-auto hx:contrast-more:border hx:contrast-more:border-gray-900 hx:contrast-more:dark:border-gray-50 hx:w-screen hx:min-h-[100px] hx:max-w-[min(calc(100vw-2rem),calc(100%+20rem))] terror-sidebar__search-results"
        aria-label="{{ (T "searchResults") | default "Search results" }}"
        style="transition: max-height 0.2s ease 0s;"
      ></ul>
      <div class="hextra-search-status hx:sr-only" aria-live="polite" role="status"></div>
    </div>
  </div>
</div>

{{- $def := site.Params.theme.default | default "light" -}}
<div
  class="site-theme-selector hx:hidden md:flex hx:items-center hx:shrink-0 hx:mr-1"
  data-theme-mode-selector
  data-theme-default="{{ $def }}"
>
  <span class="hx:sr-only">Color mode</span>
  <div
    class="site-theme-selector__group hx:inline-flex hx:border hx:border-gray-300 hx:dark:border-neutral-600 hx:rounded hx:overflow-hidden"
    role="group"
    aria-label="Color mode"
  >
    <button
      type="button"
      class="site-theme-selector__btn hx:px-2.5 hx:py-1 hx:text-xs hx:font-medium hx:text-gray-700 hx:bg-white hx:dark:text-gray-200 hx:dark:bg-dark hx:border-0 hx:cursor-pointer hx:hextra-focus-visible-inset"
      data-theme-choice="light"
      aria-pressed="false"
    >
      Light
    </button>
    <button
      type="button"
      class="site-theme-selector__btn hx:px-2.5 hx:py-1 hx:text-xs hx:font-medium hx:text-gray-700 hx:bg-white hx:dark:text-gray-200 hx:dark:bg-dark hx:border-0 hx:border-l hx:border-gray-300 hx:dark:border-neutral-600 hx:cursor-pointer hx:hextra-focus-visible-inset"
      data-theme-choice="dark"
      aria-pressed="false"
    >
      Dark
    </button>
    <button
      type="button"
      class="site-theme-selector__btn hx:px-2.5 hx:py-1 hx:text-xs hx:font-medium hx:text-gray-700 hx:bg-white hx:dark:text-gray-200 hx:dark:bg-dark hx:border-0 hx:border-l hx:border-gray-300 hx:dark:border-neutral-600 hx:cursor-pointer hx:hextra-focus-visible-inset"
      data-theme-choice="system"
      aria-pressed="false"
    >
      System
    </button>
  </div>
</div>
<script>
  (function () {
    var root = document.querySelector("[data-theme-mode-selector]");
    if (!root) return;
    var buttons = root.querySelectorAll("button[data-theme-choice]");
    var media = window.matchMedia("(prefers-color-scheme: dark)");

    function storedOrDefault() {
      try {
        var s = localStorage.getItem("color-theme");
        if (s === "light" || s === "dark" || s === "system") return s;
      } catch (e) {}
      var d = root.getAttribute("data-theme-default") || "light";
      return d === "dark" || d === "system" ? d : "light";
    }

    function syncHextraChrome(mode) {
      document.querySelectorAll(".hextra-theme-toggle").forEach(function (btn) {
        var wrap = btn.parentElement;
        if (wrap && wrap.dataset) wrap.dataset.theme = mode;
      });
      document.querySelectorAll(".hextra-theme-toggle-options[role='menu']").forEach(function (menu) {
        menu.setAttribute("data-theme", mode);
      });
      document
        .querySelectorAll(".hextra-theme-toggle-options button[role='menuitemradio']")
        .forEach(function (option) {
          var on = option.getAttribute("data-item") === mode;
          option.setAttribute("aria-checked", on ? "true" : "false");
        });
    }

    function apply() {
      var mode = storedOrDefault();
      if (typeof setTheme === "function") {
        setTheme(mode);
      }
      buttons.forEach(function (b) {
        b.setAttribute("aria-pressed", b.getAttribute("data-theme-choice") === mode ? "true" : "false");
      });
      syncHextraChrome(mode);
    }

    buttons.forEach(function (b) {
      b.addEventListener("click", function () {
        try {
          localStorage.setItem("color-theme", b.getAttribute("data-theme-choice"));
        } catch (e) {}
        apply();
      });
    });

    media.addEventListener("change", function () {
      if (storedOrDefault() === "system") apply();
    });

    function onReady() {
      apply();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", onReady);
    } else {
      onReady();
    }
  })();
</script>

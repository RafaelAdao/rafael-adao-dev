{{ define "main" }}
  <div class="terror-page">
    <div class="terror-page__grid">
      <div class="terror-page__main">
        <main id="content">
          {{ if .Title }}
            <h1 class="terror-static__title">{{ .Title }}</h1>
          {{ end }}
          {{- with .Translations -}}
            <p class="terror-article__meta">
              <span class="terror-lang-row">
                {{- range $i, $t := . -}}
                  {{- if $i }}<span aria-hidden="true">|</span>{{ end -}}
                  <a href="{{ $t.RelPermalink }}" hreflang="{{ $t.Language.Lang }}"{{ if eq $t.Lang $.Lang }} aria-current="page"{{ end }}>{{ upper $t.Language.Lang }}</a>
                {{- end -}}
              </span>
            </p>
          {{- end -}}
          <div class="content post-content terror-static">{{ .Content }}</div>
          {{ partial "components/comments.html" . }}
        </main>
      </div>
      {{ partial "terror-sidebar.html" . }}
    </div>
  </div>
{{ end }}
